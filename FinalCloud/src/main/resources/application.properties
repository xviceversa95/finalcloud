spring.application.name=FinalCloud
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/userdatabasete
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.username=user
spring.datasource.password=password
spring.flyway.enabled = true
spring.flyway.baseline-on-migrate=true

secret.key=${SECRET_KEY}


spring.servlet.multipart.max-file-size=40MB
spring.servlet.multipart.max-request-size=40MB

spring.mongodb.uri=mongodb://mongodb:27017/mongo

logging.level.root=INFO

file.storage.directory=/filecloud/storage
file.allowed.mime.types=text/plain,image/jpeg,image/png,image/gif,application/json,application/pdf,audio/mpeg,video/mp4,video/webm,application/octet-stream

logging.level.org.flywaydb=DEBUG

